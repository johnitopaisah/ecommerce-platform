[flake8]
max-line-length = 120
exclude =
    .git,
    __pycache__,
    venv,
    .venv,
    migrations,
    staticfiles,
    .eggs
ignore =
    E203,
    W503,
    F401

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = tests.py test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --reuse-db
    --nomigrations
    -v
testpaths = apps

[coverage:run]
source = apps
omit =
    */migrations/*
    */tests/*
    */admin.py

[coverage:report]
show_missing = True
skip_covered = False
