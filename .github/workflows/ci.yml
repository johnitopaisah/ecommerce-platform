name: Full Platform — Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and push (e.g. v1.0.0)"
        required: true
        type: string
      services:
        description: "Which services to build"
        required: true
        type: choice
        default: "all"
        options:
          - all
          - api
          - user-ui
          - admin-ui

jobs:
  # ── API ────────────────────────────────────────────────────────────────────
  api:
    name: API Pipeline
    if: inputs.services == 'all' || inputs.services == 'api'
    uses: ./.github/workflows/api.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  # ── User UI ────────────────────────────────────────────────────────────────
  user-ui:
    name: User UI Pipeline
    if: inputs.services == 'all' || inputs.services == 'user-ui'
    uses: ./.github/workflows/user-ui.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  # ── Admin UI ───────────────────────────────────────────────────────────────
  admin-ui:
    name: Admin UI Pipeline
    if: inputs.services == 'all' || inputs.services == 'admin-ui'
    uses: ./.github/workflows/admin-ui.yml
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  # ── Release summary ────────────────────────────────────────────────────────
  summary:
    name: Release summary
    runs-on: ubuntu-latest
    needs: [api, user-ui, admin-ui]
    if: always()
    steps:
      - name: Print release summary
        run: |
          echo "## Release ${{ inputs.tag }} Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ needs.api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| User UI | ${{ needs.user-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin UI | ${{ needs.admin-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Hub images:**" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-api:${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-user-ui:${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-admin-ui:${{ inputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
