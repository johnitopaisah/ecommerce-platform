name: API — Build, Scan & Push

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and push (e.g. v1.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build and push (e.g. v1.0.0)"
        required: true
        type: string

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-api
  PYTHON_VERSION: "3.13"

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: ecom_user
          POSTGRES_PASSWORD: ecom_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout tag ${{ inputs.tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django coverage flake8

      - name: Create test .env
        working-directory: api
        run: |
          cat > .env << 'ENVEOF'
          SECRET_KEY=ci-test-secret-key-not-for-production-use-at-all
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DATABASE_URL=postgres://ecom_user:ecom_pass@localhost:5432/ecommerce_test
          REDIS_URL=redis://localhost:6379/0
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          JWT_ACCESS_TOKEN_LIFETIME_MINUTES=60
          JWT_REFRESH_TOKEN_LIFETIME_DAYS=7
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          DEFAULT_FROM_EMAIL=noreply@test.com
          FRONTEND_URL=http://localhost:3000
          STRIPE_PUBLISHABLE_KEY=pk_test_dummy
          STRIPE_SECRET_KEY=sk_test_dummy
          STRIPE_ENDPOINT_SECRET=whsec_dummy
          USE_S3=False
          ENVEOF

      - name: Run migrations
        working-directory: api
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py migrate --noinput

      - name: Run linting
        working-directory: api
        run: flake8 apps/ config/ --statistics --count

      - name: Run tests
        working-directory: api
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: |
          coverage run -m pytest apps/ -v --tb=short 2>&1 | tee test-results.txt \
            || echo "No tests found yet — skipping"
          coverage report --skip-covered || true
          coverage xml -o coverage.xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: api/coverage.xml
          flags: api
          fail_ci_if_error: false

  build-and-push:
    name: Build, scan & push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout tag ${{ inputs.tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Validate tag format
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Tag must follow semver format: v1.2.3 (got '${{ inputs.tag }}')"
            exit 1
          fi
          echo "Tag ${{ inputs.tag }} is valid"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (for scanning)
        uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          output: trivy-api-report.txt

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-api-report-${{ inputs.tag }}
          path: trivy-api-report.txt
          retention-days: 90

      - name: Print scan summary
        if: always()
        run: cat trivy-api-report.txt || true

      - name: Push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ inputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## API Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ inputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
