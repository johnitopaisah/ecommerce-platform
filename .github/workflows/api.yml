name: API — Test, Build, Scan & Push

on:
  push:
    branches: [main, develop]
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  pull_request:
    branches: [main]
    paths:
      - "api/**"
  workflow_call:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-api
  PYTHON_VERSION: "3.13"

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: ecom_user
          POSTGRES_PASSWORD: ecom_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        working-directory: api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django coverage flake8

      - name: Create test .env
        working-directory: api
        run: |
          cat > .env << 'ENVEOF'
          SECRET_KEY=ci-test-secret-key-not-for-production-use-at-all
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DATABASE_URL=postgres://ecom_user:ecom_pass@localhost:5432/ecommerce_test
          REDIS_URL=redis://localhost:6379/0
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          JWT_ACCESS_TOKEN_LIFETIME_MINUTES=60
          JWT_REFRESH_TOKEN_LIFETIME_DAYS=7
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          DEFAULT_FROM_EMAIL=noreply@test.com
          FRONTEND_URL=http://localhost:3000
          STRIPE_PUBLISHABLE_KEY=pk_test_dummy
          STRIPE_SECRET_KEY=sk_test_dummy
          STRIPE_ENDPOINT_SECRET=whsec_dummy
          USE_S3=False
          ENVEOF

      - name: Run migrations
        working-directory: api
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: python manage.py migrate --noinput

      - name: Run linting (flake8)
        working-directory: api
        run: |
          # flake8 reads config from setup.cfg automatically
          # (max-line-length=120, ignores E203 W503 F401, excludes migrations)
          flake8 apps/ config/ --statistics --count

      - name: Run tests with coverage
        working-directory: api
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: |
          coverage run -m pytest apps/ -v --tb=short 2>&1 | tee test-results.txt \
            || echo "No tests found yet — skipping"
          coverage report --skip-covered || true
          coverage xml -o coverage.xml || true

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: api/coverage.xml
          flags: api
          fail_ci_if_error: false

  build-and-push:
    name: Build, scan & push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:scan
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
          output: trivy-api-report.txt

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-api-report
          path: trivy-api-report.txt
          retention-days: 30

      - name: Print scan summary
        if: always()
        run: cat trivy-api-report.txt || true

      - name: Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
