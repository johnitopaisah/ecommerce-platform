version: '3.9'

# ── Shared network ─────────────────────────────────────────────────────────────
networks:
  ecom_net:
    driver: bridge

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  media_data:

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ecom_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # exposed so you can connect with TablePlus / psql locally
    networks:
      - ecom_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"          # exposed so you can inspect with redis-cli locally
    networks:
      - ecom_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API ───────────────────────────────────────────────────────────────
