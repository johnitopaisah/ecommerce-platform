version: '3.9'

networks:
  ecom_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:

services:

  db:
    image: postgres:16-alpine
    container_name: ecom_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: ecom_user
      POSTGRES_PASSWORD: ecom_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecom_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecom_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - ecom_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ecom_api
    restart: unless-stopped
    env_file:
      - ./api/.env.docker
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecom_net

  user-ui:
    build:
      context: ./user-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api/v1
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_replace_me
    container_name: ecom_user_ui
    restart: unless-stopped
    environment:
      PORT: 3000
    depends_on:
      - api
    networks:
      - ecom_net

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api/v1
    container_name: ecom_admin_ui
    restart: unless-stopped
    environment:
      PORT: 3001
    depends_on:
      - api
    networks:
      - ecom_net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ecom_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - api
      - user-ui
      - admin-ui
    networks:
      - ecom_net
