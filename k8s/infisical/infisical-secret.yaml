# ─────────────────────────────────────────────────────────────────────────────
# InfisicalSecret — tells the operator WHAT to sync and WHERE to put it
#
# The Infisical operator watches this CRD and:
#   1. Authenticates with Infisical Cloud using the machine identity
#   2. Pulls all secrets from the specified project + environment
#   3. Creates/updates a native Kubernetes Secret named "api-secret"
#   4. Re-syncs every 60 seconds (resyncInterval)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: shopnow-secrets
  namespace: ecommerce
  labels:
    app: shopnow
spec:
  # How often to re-sync secrets from Infisical (in seconds)
  resyncInterval: 60

  # Where to get the secrets from
  authentication:
    universalAuth:
      secretsScope:
        # ── Replace these two values with your actual Infisical project ────
        # Go to: Infisical → Project Settings → Project ID
        projectSlug: "REPLACE_WITH_YOUR_PROJECT_SLUG"
        # Environment slug: dev, staging, prod
        envSlug: "dev"
        # Optional: pull only secrets under a specific path (/ = all)
        secretsPath: "/"
        recursive: true
      credentialsRef:
        # References the secret we created in infisical-auth-secret.yaml
        secretName: infisical-machine-identity
        secretNamespace: ecommerce

  # Where to write the synced secrets in Kubernetes
  managedSecretReference:
    secretName: api-secret          # This becomes the K8s Secret name
    secretNamespace: ecommerce
    # Recreate the secret if it drifts or is deleted
    creationPolicy: "Orphan"
