apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-ui
  namespace: ecommerce
  labels:
    app: shopnow
    component: user-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopnow
      component: user-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopnow
        component: user-ui
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      initContainers:
        # Wait for the API to be healthy before starting the UI
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for API to be ready..."
              until wget -qO- http://api:8000/api/v1/health/ > /dev/null 2>&1; do
                echo "API not ready — retrying in 3s"
                sleep 3
              done
              echo "API is ready."
      containers:
        - name: user-ui
          image: johnitopaisah/ecommerce-user-ui:v0.1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            # The browser-side API URL — resolves through the Ingress
            - name: NEXT_PUBLIC_API_URL
              value: "http://shopnow.local/api/v1"
            - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: STRIPE_PUBLISHABLE_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
