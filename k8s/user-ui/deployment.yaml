apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-ui
  namespace: ecommerce
  labels:
    app: shopnow
    component: user-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopnow
      component: user-ui
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: shopnow
        component: user-ui
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z api 8000; do
                echo "API not ready — retrying in 3s"
                sleep 3
              done
              echo "API is ready."
      containers:
        - name: user-ui
          image: johnitopaisah/ecommerce-user-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            # Server-side only — tells Next.js where to proxy /api/* to
            # Never exposed to the browser. Change this anytime without rebuild.
            - name: INTERNAL_API_URL
              value: "http://api:8000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
