apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopnow-admin-ingress
  namespace: ecommerce
  labels:
    app: shopnow
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - shopnow.johnisah.com
      secretName: shopnow-tls    # Same cert secret — covers all paths
  rules:
    - host: shopnow.johnisah.com
      http:
        paths:
          - path: /admin-panel
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 3001
