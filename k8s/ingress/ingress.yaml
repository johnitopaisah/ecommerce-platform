apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopnow-ingress
  namespace: ecommerce
  labels:
    app: shopnow
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    # Start with staging — swap to letsencrypt-prod once verified
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - shopnow.johnisah.com
      secretName: shopnow-tls    # cert-manager writes the cert here
  rules:
    - host: shopnow.johnisah.com
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000

          - path: /django-admin/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000

          - path: /media/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000

          - path: /static/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8000

          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-ui
                port:
                  number: 3000
