# Docker Hub image pull secret
# ─────────────────────────────────────────────────────────────────────────────
# This secret allows Kubernetes to pull your private Docker Hub images.
#
# Create it with this command (DO NOT apply this file directly — use the command):
#
#   kubectl create secret docker-registry dockerhub-secret \
#     --docker-server=https://index.docker.io/v1/ \
#     --docker-username=YOUR_DOCKERHUB_USERNAME \
#     --docker-password=YOUR_DOCKERHUB_TOKEN \
#     --docker-email=YOUR_EMAIL \
#     --namespace=ecommerce
#
# After creating it, verify with:
#   kubectl get secret dockerhub-secret -n ecommerce
# ─────────────────────────────────────────────────────────────────────────────
#
# This file is intentionally left as documentation only.
# The secret is created via kubectl command above, not this YAML,
# because the .dockerconfigjson value is long and auto-generated.
